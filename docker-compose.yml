services:
  mindcare:
    build:
      context: .
      dockerfile: Dockerfile
    image: tuta699/mental-health-stress-detector:tagname
    container_name: mindcare-app
    ports:
      - "5001:5001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5001/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
